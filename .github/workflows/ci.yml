name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          PROJECTS='[]'

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            # First push or no base — run everything
            PROJECTS='["ngx-boost-sidebar-menu","ngx-boost-topbar","demo-app"]'
          else
            CHANGED=$(git diff --name-only "$BASE" HEAD || echo "")

            # Root config changes affect all
            if echo "$CHANGED" | grep -qE '^(package\.json|angular\.json|tsconfig|eslint|\.github/|\.node-version)'; then
              PROJECTS='["ngx-boost-sidebar-menu","ngx-boost-topbar","demo-app"]'
            else
              LIB_SIDEBAR=false
              LIB_TOPBAR=false

              if echo "$CHANGED" | grep -q '^projects/ngx-boost-sidebar-menu/'; then
                PROJECTS=$(echo "$PROJECTS" | jq '. + ["ngx-boost-sidebar-menu"]')
                LIB_SIDEBAR=true
              fi

              if echo "$CHANGED" | grep -q '^projects/ngx-boost-topbar/'; then
                PROJECTS=$(echo "$PROJECTS" | jq '. + ["ngx-boost-topbar"]')
                LIB_TOPBAR=true
              fi

              if echo "$CHANGED" | grep -q '^projects/demo-app/'; then
                PROJECTS=$(echo "$PROJECTS" | jq '. + ["demo-app"]')
              fi

              # If any library changed, demo-app must be verified too
              if [ "$LIB_SIDEBAR" = "true" ] || [ "$LIB_TOPBAR" = "true" ]; then
                if ! echo "$PROJECTS" | jq -e 'contains(["demo-app"])' > /dev/null 2>&1; then
                  PROJECTS=$(echo "$PROJECTS" | jq '. + ["demo-app"]')
                fi
              fi
            fi
          fi

          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT
          echo "any=$(echo "$PROJECTS" | jq 'length > 0')" >> $GITHUB_OUTPUT

  quality:
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      # Lint — only affected projects
      - run: npm run lint ngx-boost-sidebar-menu
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'ngx-boost-sidebar-menu') }}
      - run: npm run lint ngx-boost-topbar
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'ngx-boost-topbar') }}
      - run: npm run lint demo-app
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'demo-app') }}

      # Test — only affected libraries
      - run: npm run test ngx-boost-sidebar-menu
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'ngx-boost-sidebar-menu') }}
      - run: npm run test ngx-boost-topbar
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'ngx-boost-topbar') }}

      # Build libraries — affected + those needed by demo-app
      - run: npm run build ngx-boost-sidebar-menu
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'ngx-boost-sidebar-menu') || contains(fromJSON(needs.detect-changes.outputs.projects), 'demo-app') }}
      - run: npm run build ngx-boost-topbar
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'ngx-boost-topbar') }}

      # Demo-app: test + build
      - run: npm run test demo-app
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'demo-app') }}
      - run: npm run build demo-app
        if: ${{ contains(fromJSON(needs.detect-changes.outputs.projects), 'demo-app') }}

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci

      - name: Publish ngx-boost-sidebar-menu
        run: |
          PKG="ngx-boost-sidebar-menu"
          LOCAL=$(node -p "require('./projects/${PKG}/package.json').version")
          echo "Local version: ${LOCAL}"
          PUBLISHED=$(npm view ${PKG} version 2>/dev/null || echo "")
          echo "Published version: ${PUBLISHED:-none}"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "New version detected, building..."
            npm run build ${PKG}
            echo "Publishing..."
            npm publish dist/${PKG}/ --access public
          else
            echo "No version change for ${PKG}, skipping publish"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish ngx-boost-topbar
        run: |
          PKG="ngx-boost-topbar"
          LOCAL=$(node -p "require('./projects/${PKG}/package.json').version")
          echo "Local version: ${LOCAL}"
          PUBLISHED=$(npm view ${PKG} version 2>/dev/null || echo "")
          echo "Published version: ${PUBLISHED:-none}"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "New version detected, building..."
            npm run build ${PKG}
            echo "Publishing..."
            npm publish dist/${PKG}/ --access public
          else
            echo "No version change for ${PKG}, skipping publish"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
